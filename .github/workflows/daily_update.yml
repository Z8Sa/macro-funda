name: Macro Dashboard XAUUSD - Daily Update

on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  update-dashboard:
    name: Update Data & Generate Signal
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests fredapi newsapi-python streamlit plotly python-dotenv pyarrow yfinance
      
      - name: Create data directory
        run: mkdir -p data
      
      - name: Run pipeline
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: |
          python scripts/fetch_macro_data.py
          python scripts/filter_news.py
          python scripts/generate_signals.py
      
      - name: Commit and push results
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data/
          
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan data"
          else
            git commit -m "Auto update: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin master
            echo "Data berhasil diupdate"
          fi